<!doctype html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>탐구 마법사</title><link rel="stylesheet" href="style.css"></head>
<body><main class="wrap wizard-wrap"><div class="topbar"><a href="student.html">학생 탐구실로</a><span class="badge">Wizard</span></div><h1>탐구 마법사</h1><section class="card" id="projectBox"><div class="section-title"><div><h2 id="projectTopic">탐구 주제</h2><p class="muted" id="progressText">진행률 30%</p></div><button class="btn secondary" onclick="saveProject(autoProgress(), true)">현재 단계 저장</button></div><div class="bar big"><span id="progressBar" style="width:30%"></span></div><div class="wizard-stepper" id="wizardStepper"><span class="active">계획서</span><span>자료조사</span><span>설문</span><span>인터뷰</span><span>탐구일지</span><span>보고서</span><span>인쇄</span></div><section class="wizard-page" id="wizardPlan"><span class="step-label">1단계</span><h3>탐구계획서</h3><textarea id="plan"></textarea><label class="field-label">계획서 메모</label><textarea class="memo-box" id="planNote"></textarea></section><section class="wizard-page hidden" id="wizardGuide"><span class="step-label">2단계</span><h3>자료조사 가이드</h3><button class="btn secondary" onclick="loadGuide()">자료조사 가이드 생성</button><div id="guideOutput" class="output"></div><label class="field-label">자료조사 메모</label><textarea class="memo-box" id="guideNote"></textarea></section><section class="wizard-page hidden" id="wizardSurvey"><span class="step-label">3단계</span><h3>설문 문항</h3><button class="btn secondary" onclick="loadSurvey()">설문 문항 생성</button><div id="surveyOutput" class="output"></div><label class="field-label">설문 메모</label><textarea class="memo-box" id="surveyNote"></textarea></section><section class="wizard-page hidden" id="wizardInterview"><span class="step-label">4단계</span><h3>인터뷰 질문</h3><button class="btn secondary" onclick="loadInterview()">인터뷰 질문 생성</button><div id="interviewOutput" class="output"></div><label class="field-label">인터뷰 메모</label><textarea class="memo-box" id="interviewNote"></textarea></section><section class="wizard-page hidden" id="wizardLog"><span class="step-label">5단계</span><h3>탐구일지</h3><textarea class="memo-box" id="log" placeholder="오늘 한 활동, 알게 된 점, 다음에 할 일을 적어보세요."></textarea></section><section class="wizard-page hidden" id="wizardReport"><span class="step-label">6단계</span><h3>보고서 초안</h3><button class="btn" onclick="makeReport()">보고서 초안 생성</button><div id="reportOutput" class="output"></div><label class="field-label">보고서 정리 메모</label><textarea class="memo-box" id="reportNote"></textarea></section><section class="wizard-page hidden" id="wizardPrint"><span class="step-label">7단계</span><h3>정리내용 인쇄</h3><div class="row no-print"><button class="btn secondary" onclick="renderPrintSummary()">정리내용 새로고침</button><button class="btn" onclick="printSummary()">PDF로 인쇄</button></div><div id="printSummary" class="print-summary"></div></section><div class="wizard-nav no-print"><button class="btn secondary" id="prevWizardBtn" onclick="prevWizardStep()">이전</button><button class="btn" id="nextWizardBtn" onclick="nextWizardStep()">다음</button></div></section></main><script src="app.js"></script></body>
</html>
