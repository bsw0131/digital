<!doctype html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI 설정</title><link rel="stylesheet" href="style.css"></head>
<body><main class="wrap"><div class="topbar"><a href="teacher.html">교사 대시보드</a><span class="badge">AI Settings</span></div><h1>AI 설정</h1><section class="card" id="aiSettingsLogin"><h2>교사 확인</h2><div class="row"><input class="input" id="aiSettingsPw" type="password" placeholder="교사 비밀번호"><button class="btn" onclick="aiSettingsLogin()">확인</button></div></section><section class="card hidden" id="aiSettingsBox"><h2>AI 설정</h2><p class="muted" id="aiSettingsStatus">설정을 불러오는 중입니다.</p><label class="toggle-row"><input type="checkbox" id="onlineAiEnabled"><span>온라인 AI 사용</span></label><label class="field-label">OpenAI API 키</label><input class="input" id="aiApiKey" type="password" placeholder="sk-... 새 키를 입력하면 저장됩니다."><p class="muted" id="aiKeyHint"></p><label class="field-label">AI 모델</label><input class="input" id="aiModel" value="gpt-4o-mini"><label class="toggle-row small-toggle"><input type="checkbox" id="clearAiKey"><span>저장된 API 키 삭제</span></label><button class="btn" onclick="saveAiSettings()">AI 설정 저장</button></section></main><script src="app.js"></script></body>
</html>
