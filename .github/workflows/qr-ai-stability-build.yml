name: Build stable QR AI EXE

on:
  workflow_dispatch:
  push:
    paths:
      - 'QR코드버전/backend/ai_engine.py'
      - 'QR코드버전/backend/smoke_test.py'
      - '.github/workflows/qr-ai-stability-build.yml'

permissions:
  contents: write

jobs:
  test-and-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r "QR코드버전/backend/requirements.txt"
          pip install pyinstaller httpx

      - name: Validate QR sources
        shell: pwsh
        run: |
          python -m py_compile "QR코드버전/backend/ai_engine.py" "QR코드버전/backend/settings_store.py" "QR코드버전/backend/smoke_test.py"
          Push-Location "QR코드버전/backend"
          python smoke_test.py
          Pop-Location

      - name: Build QR executable
        shell: pwsh
        run: |
          Push-Location "QR코드버전"
          pyinstaller --noconfirm --clean "AI탐구메이트_QR수업모드.spec"
          Pop-Location
          $exe = "QR코드버전/dist/AI탐구메이트_QR수업모드.exe"
          if (-not (Test-Path $exe)) { throw "EXE was not created" }
          if ((Get-Item $exe).Length -lt 10000000) { throw "EXE is unexpectedly small" }
          Get-Item $exe | Select-Object FullName, Length, LastWriteTime

      - name: Commit rebuilt EXE
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "QR코드버전/dist/AI탐구메이트_QR수업모드.exe"
          if (git diff --cached --quiet) {
            Write-Host "EXE unchanged"
          } else {
            git commit -m "QR AI 안정화 EXE 재빌드 [skip ci]"
            git push
          }
