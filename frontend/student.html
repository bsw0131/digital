<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학생 - AI 탐구메이트</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">
    <div class="topbar"><a href="index.html">처음으로</a><span class="badge">Student</span></div>
    <h1>학생 탐구실</h1>

    <section class="card" id="loginBox">
      <h2>이름과 학번 입력</h2>
      <div class="row">
        <input class="input" id="name" placeholder="이름">
        <input class="input" id="studentNo" placeholder="학번 예: 20101">
        <button class="btn" onclick="login()">입장</button>
      </div>
    </section>

    <section class="card hidden" id="myProjectsBox">
      <h2>내 기존 탐구</h2>
      <p class="muted">진행 상황을 적고 저장하면 교사 화면에서 바로 확인할 수 있습니다.</p>
      <div id="myProjects" class="grid"></div>
    </section>

    <section class="card hidden" id="interestBox">
      <h2>관심사 입력</h2>
      <div id="tags" class="tags"></div>
      <input class="input" id="detail" placeholder="예: 로블록스, 축구 전술, 학교 급식, 유튜브 알고리즘">
      <button class="btn" onclick="recommend()">탐구주제 추천받기</button>
    </section>

    <section class="card hidden" id="recommendBox">
      <h2>추천 탐구주제</h2>
      <p class="muted" id="modeText"></p>
      <div id="topics" class="grid"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
