<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학생 - AI 탐구메이트</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="rubric.css">
</head>
<body>
  <main class="wrap">
    <div class="topbar"><a href="class.html">QR 수업 화면</a><span class="badge">Student</span></div>
    <h1>학생 탐구실</h1>

    <section class="card" id="loginBox">
      <h2>학번과 이름 입력</h2>
      <div class="row">
        <input class="input" id="studentNo" placeholder="학번 예: 20101">
        <input class="input" id="name" placeholder="이름">
        <button class="btn" onclick="login()">입장</button>
      </div>
    </section>

    <section class="card hidden" id="myProjectsBox">
      <h2>내 기존 탐구</h2>
      <p class="muted">진행 상황을 적고 저장하면 교사 화면에서 바로 확인할 수 있습니다.</p>
      <div id="myProjects" class="grid"></div>
    </section>

    <section class="card hidden" id="interestBox">
      <h2>관심사 입력</h2>
      <p class="muted">버튼 관심사와 직접 입력 관심사를 합쳐 최대 2개까지 융합할 수 있습니다. 직접 입력은 쉼표(,)로 구분하세요.</p>
      <div id="tags" class="tags"></div>
      <input class="input" id="detail" placeholder="직접 입력 예: 로블록스, 축구 전술">
      <button class="btn" onclick="recommend()">탐구주제 추천받기</button>
    </section>

    <section class="card hidden" id="customTopicBox">
      <h2>내가 정한 주제로 시작</h2>
      <p class="muted">추천 주제를 고르지 않아도, 이미 정한 탐구주제가 있다면 그대로 입력해서 계획서부터 진행할 수 있습니다.</p>
      <div class="row">
        <input class="input" id="customTopic" placeholder="예: 생성형 AI 사용이 학습 태도와 과제 완성도에 미치는 영향">
        <button class="btn secondary" onclick="startCustomTopic()">직접 입력한 주제로 시작</button>
      </div>
    </section>

    <section class="card hidden" id="recommendBox">
      <h2>추천 탐구주제</h2>
      <p class="muted" id="modeText"></p>
      <div id="topics" class="grid"></div>
      <div id="recommendNav" class="pager"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
