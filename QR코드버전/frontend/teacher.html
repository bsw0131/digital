<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교사 - AI 탐구메이트</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="rubric.css">
  <style>
    .password-action-row{display:flex;margin:18px 0 14px}
    .password-setup-btn{min-height:58px;padding:15px 26px;background:linear-gradient(135deg,#3b82f6,#3157d5);border-color:#93b4ff;color:#fff;font-size:18px;box-shadow:0 12px 24px rgba(49,87,213,.18)}
    .password-setup-btn:hover{box-shadow:0 16px 28px rgba(49,87,213,.24)}
    .password-setup-btn.compact{min-height:54px;font-size:16px}
    .login-row{padding-top:10px;border-top:1px solid var(--line)}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar"><a href="class.html">QR 수업 화면</a><span class="badge">Teacher</span></div>
    <div class="section-title">
      <h1>교사 대시보드</h1>
      <div class="row no-print">
        <a class="btn secondary" href="class.html">QR 수업 화면</a>
        <a class="btn secondary" href="ai-settings.html">AI 설정</a>
      </div>
    </div>

    <section class="card" id="teacherLogin">
      <h2>교사 로그인</h2>
      <p class="muted" id="teacherPasswordStatus">비밀번호 설정 상태를 확인하고 있습니다.</p>
      <div class="password-action-row">
        <button class="btn password-setup-btn" onclick="showTeacherPasswordPanel()">비밀번호 설정</button>
      </div>
      <div class="row login-row">
        <input class="input" id="teacherPw" type="password" placeholder="비밀번호">
        <button class="btn" onclick="teacherLogin()">로그인</button>
      </div>
      <p class="muted">처음 실행할 때는 교사 비밀번호가 없습니다.</p>

      <div class="auth-panel hidden" id="teacherPasswordPanel">
        <h3>비밀번호 설정</h3>
        <label class="field-label" for="newTeacherPw">새 비밀번호</label>
        <input class="input" id="newTeacherPw" type="password" placeholder="새 비밀번호">
        <label class="field-label hidden" id="currentTeacherPwLabel" for="currentTeacherPw">현재 비밀번호</label>
        <input class="input hidden" id="currentTeacherPw" type="password" placeholder="현재 비밀번호">
        <label class="field-label" for="teacherPwHint">비밀번호 찾기 힌트</label>
        <input class="input" id="teacherPwHint" placeholder="예: 우리 반 이름">
        <div class="row tools">
          <button class="btn" onclick="setTeacherPassword()">저장</button>
          <button class="btn secondary" onclick="hideTeacherPasswordPanel()">닫기</button>
        </div>
      </div>

      <div class="auth-panel" id="teacherRecoverPanel">
        <h3>비밀번호 찾기</h3>
        <div class="row">
          <input class="input" id="teacherRecoverHint" placeholder="설정한 힌트를 입력하세요">
          <button class="btn secondary" onclick="recoverTeacherPassword()">찾기</button>
        </div>
        <p class="muted" id="teacherRecoverResult"></p>
      </div>
    </section>

    <section class="card hidden" id="dash">
      <div class="section-title">
        <h2>학생 탐구 현황</h2>
        <div class="row no-print">
          <button class="btn secondary" onclick="loadDashboard()">새로고침</button>
          <button class="btn password-setup-btn compact" onclick="showTeacherPasswordPanel()">비밀번호 설정</button>
          <a class="btn secondary" href="ai-settings.html">AI 설정</a>
          <button class="btn secondary" onclick="saveDashboardPdf()">PDF로 저장</button>
          <button class="btn danger" onclick="resetStudentData()">학생자료 초기화</button>
        </div>
      </div>
      <div id="dashboard"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
