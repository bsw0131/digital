<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교사 - AI 탐구메이트</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="rubric.css">
  <style>
    .mode-choice-grid{display:grid;grid-template-columns:repeat(2,minmax(240px,1fr));gap:16px;margin-top:18px}
    .mode-choice-btn{min-height:118px;display:flex;flex-direction:column;align-items:flex-start;gap:8px;text-align:left;font-size:18px}
    .mode-choice-btn strong{font-size:24px}
    .mode-choice-btn span{font-size:14px;line-height:1.5;font-weight:800;opacity:.92}
    .mode-choice-btn.offline{background:#fff;color:#243969;border-color:#b9c9ff;box-shadow:0 10px 22px rgba(49,87,213,.10)}
    .teacher-auth-card{max-width:680px;margin-inline:auto}
    .auth-fields{display:grid;gap:12px;margin-top:18px}
    .auth-fields .field-label{margin:0 0 -6px}
    .login-row{display:grid;grid-template-columns:minmax(220px,1fr) auto;gap:10px;align-items:center;margin-top:18px}
    .login-only-actions{display:flex;gap:10px;flex-wrap:wrap}
    .password-setup-btn.compact{min-height:48px;font-size:15px}
    @media(max-width:760px){.mode-choice-grid{grid-template-columns:1fr}.mode-choice-btn{min-height:104px}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar"><a href="class.html">QR 수업 화면</a><span class="badge">Teacher</span></div>
    <div class="section-title">
      <h1>교사 대시보드</h1>
      <div class="row no-print">
        <a class="btn secondary" href="class.html">QR 수업 화면</a>
      </div>
    </div>

    <section class="card" id="teacherModeSelect">
      <h2>교사 모드 선택</h2>
      <p class="muted">수업 운영 방식에 맞게 먼저 모드를 선택하세요.</p>
      <div class="mode-choice-grid">
        <button class="btn mode-choice-btn" onclick="chooseTeacherMode('ai')">
          <strong>AI 모드</strong>
          <span>온라인 AI 사용 여부와 API 키를 설정한 뒤 수업을 준비합니다.</span>
        </button>
        <button class="btn mode-choice-btn offline" onclick="chooseTeacherMode('offline')">
          <strong>오프라인 모드</strong>
          <span>기존 교사 대시보드에서 학생 탐구 현황과 교사 피드백을 확인합니다.</span>
        </button>
      </div>
    </section>

    <section class="card hidden teacher-auth-card" id="teacherLogin">
      <h2 id="teacherAuthTitle">교사 로그인</h2>
      <p class="muted" id="teacherPasswordStatus">비밀번호 설정 상태를 확인하고 있습니다.</p>

      <div id="teacherLoginFields">
        <div class="login-row">
          <input class="input" id="teacherPw" type="password" placeholder="교사 비밀번호" onkeydown="if(event.key==='Enter') teacherLogin()">
          <div class="login-only-actions">
            <button class="btn" onclick="teacherLogin()">로그인</button>
            <button class="btn secondary hidden" id="teacherHintBtn" onclick="showTeacherHintPanel()">힌트 확인</button>
          </div>
        </div>
      </div>

      <div class="auth-fields hidden" id="teacherPasswordPanel">
        <label class="field-label" for="newTeacherPw">새 비밀번호</label>
        <input class="input" id="newTeacherPw" type="password" placeholder="새 비밀번호">
        <label class="field-label" for="confirmTeacherPw">비밀번호 확인</label>
        <input class="input" id="confirmTeacherPw" type="password" placeholder="새 비밀번호를 한 번 더 입력하세요">
        <label class="field-label" for="teacherPwHint">비밀번호 힌트 <span class="muted">(선택)</span></label>
        <input class="input" id="teacherPwHint" placeholder="예: 우리 반 이름">
        <div class="row tools">
          <button class="btn" onclick="setTeacherPassword()">저장하고 시작</button>
          <button class="btn secondary hidden" id="cancelPasswordSetupBtn" onclick="hideTeacherPasswordPanel()">취소</button>
        </div>
      </div>

      <div class="auth-panel hidden" id="teacherRecoverPanel">
        <h3>힌트로 비밀번호 확인</h3>
        <div class="row">
          <input class="input" id="teacherRecoverHint" placeholder="설정한 힌트를 입력하세요">
          <button class="btn secondary" onclick="recoverTeacherPassword()">확인</button>
        </div>
        <p class="muted" id="teacherRecoverResult"></p>
      </div>
    </section>

    <section class="card hidden" id="dash">
      <div class="section-title">
        <h2>학생 탐구 현황</h2>
        <div class="row no-print">
          <button class="btn secondary" onclick="loadDashboard()">새로고침</button>
          <button class="btn password-setup-btn compact" onclick="showTeacherPasswordPanel()">비밀번호 변경</button>
          <a class="btn secondary" href="ai-settings.html">AI 설정</a>
          <button class="btn secondary" onclick="saveDashboardPdf()">PDF로 저장</button>
          <button class="btn danger" onclick="resetStudentData()">학생자료 초기화</button>
        </div>
      </div>
      <div id="dashboard"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
